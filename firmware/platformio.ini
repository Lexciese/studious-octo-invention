[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags =
  -DCORE_DEBUG_LEVEL=0
lib_deps =
  bblanchon/ArduinoJson @ ^7
  madhephaestus/ESP32Servo @ ^3
board_build.partitions = partitions.csv
board_build.filesystem = littlefs
